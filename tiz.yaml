mixed-port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: error
external-controller: ""
keep-alive-interval: 15
keep-alive-idle: 15
tcp-concurrent: true
unified-delay: true
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  asn: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb"

proxy-providers:
  Airport01:
    type: http
    url: 'https://cvb.14kbuy.com/api/v1/client/subscribe?token=4c90786fd3407d126018e36b763f175a'
    interval: 86400
    path: ./Airport01.yaml
    health-check:
      enable: true
      interval: 600
      url: http://cp.cloudflare.com/generate_204

  Airport02:
    type: http
    url: 'https://sub1.smallstrawberry.com/api/v1/client/subscribe?token=7bc97055ef554de0870c5c7e20a2bd4f'
    interval: 86400
    path: ./Airport02.yaml
    health-check:
      enable: true
      interval: 600
      url: http://cp.cloudflare.com/generate_204
      
  AI-Rules: # 这里是规则的名称，可以自定义
    type: http
    behavior: domain # 或 classical
    url: "https://raw.githubusercontent.com/viewer12/OverseasAI.list/main/rule/Clash/OverseasAI/OverseasAI.list"
    path: ./rules/Loyalsoldier-Rules.txt
    interval: 86400 # 更新间隔，单位为秒，86400秒为一天

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - tls://223.5.5.5
    - tls://223.6.6.6
  nameserver:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  respect-rules: true

